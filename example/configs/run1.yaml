model_roles:
  ingestion: [gemma3:27b-it-qat]
  summarization: [gemma3:27b-it-qat]
  chunking: [gemma3:27b-it-qat]
  finreg_code_generation: [gemma3:27b-it-qat]
  finreg_json_generation: [gemma3:27b-it-qat]
