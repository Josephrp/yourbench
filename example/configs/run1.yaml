pipeline:
  ingestion:
    run: true
    source_documents_dir: .\example\data\raw
    output_dir: .\example\data\processed

  upload_ingest_to_hub:
    run: true
    source_documents_dir: example/data/processed

  summarization:
    run: true

  chunking:
    run: true
    chunking_configuration:
      l_max_tokens: 2048

  finreg_code_generation:
    run: true
    source_subset: chunked
    output_subset: finreg_code

  finreg_json_generation:
    run: true
    source_subset: chunked
    output_subset: finreg_json

  single_shot_question_generation:
    run: true

  multi_hop_question_generation:
    run: true

  lighteval:
    run: true

  citation_score_filtering:
    run: true
